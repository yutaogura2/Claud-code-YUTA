# 株スクリーニング設定（日本株）
# 銘柄は yfinance 形式の証券コード + ".T"（東証）で記載。
# universe を自分の監視リストに置き換えて使う。

market: JP            # JP=日本株
index: "^N225"        # Fear&Greed の基準指数（日経平均）
vix: "^VIX"           # 恐怖指数（日本版が無いため米VIXを代理利用）

# キャッシュ（yfinance 取得結果を data/cache に保存する時間 / 秒）
cache_ttl: 86400      # 24h

# 取得の並列数（Yahooのレート制限回避のため過大にしない）
fetch:
  max_workers: 8

# ── バリュースコア配分（合計100点）── Vol.1 準拠
value_weights:
  per: 25             # PER 低いほど高得点
  pbr: 25             # PBR 低いほど高得点
  dividend: 20        # 配当利回り 高いほど高得点
  roe: 15             # ROE 高いほど高得点
  growth: 15          # 売上成長率 高いほど高得点

# 各指標のスコア境界（min=0点, max=満点）
value_bounds:
  per:  {full: 8,    zero: 25}    # PER<=8 で満点, >=25 で0点
  pbr:  {full: 0.8,  zero: 3.0}
  dividend: {full: 4.0, zero: 0.0}   # 配当利回り(%) >=4 で満点
  roe:  {full: 15.0, zero: 0.0}      # ROE(%) >=15 で満点
  growth: {full: 15.0, zero: 0.0}    # 売上成長率(%) >=15 で満点

# ── 逆張り（contrarian）判定閾値 ── Vol.3 準拠
contrarian:
  rsi_max: 30         # RSI<=30 売られすぎ
  vol_surge: 1.5      # 出来高 > 平均*1.5
  per_max: 15         # 低PER
  pbr_max: 1.5        # 低PBR

# ── モメンタム（momentum）判定閾値 ──
momentum:
  rsi_min: 70         # RSI>=70 過熱（記事は75超だが調整可）
  vol_trend: 1.2      # 出来高トレンド上昇

# 結果の最低スコア（これ未満は表示しない）
min_score: 50

# ── アルファ（割安×業績改善）── Vol.1 準拠
alpha_weights:
  accruals: 25       # アクルーアルズ（利益の質）
  sales_accel: 25    # 売上加速度
  fcf_margin: 25     # FCFマージン変化
  roe_trend: 25      # ROE趨勢
alpha_bounds:
  accruals:    {full: -0.05, zero: 0.10}   # 低いほど良い
  sales_accel: {full: 0.05,  zero: -0.05}
  fcf_margin:  {full: 0.03,  zero: -0.03}
  roe_trend:   {full: 0.03,  zero: -0.03}
alpha_pullback:
  rsi_max: 35        # 押し目フラグ: RSI<=35 か ボリンジャー下限割れ

# AI考察（ネット論調要約・Gemini）。キーは環境変数 GEMINI_API_KEY
ai_insight:
  provider: gemini
  model: "gemini-2.5-flash"
  top_n: 10

